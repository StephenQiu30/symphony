services:
  symphony:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_VERSION: ${CODEX_VERSION:-0.135.0}
    environment:
      LINEAR_API_KEY: ${LINEAR_API_KEY:?Set LINEAR_API_KEY before starting Symphony}
      SOURCE_REPO_URL: ${SOURCE_REPO_URL:-https://github.com/openai/symphony}
      SYMPHONY_LINEAR_PROJECT_SLUG: ${SYMPHONY_LINEAR_PROJECT_SLUG:?Set SYMPHONY_LINEAR_PROJECT_SLUG before starting Symphony}
      SYMPHONY_WORKSPACE_ROOT: /root/code/symphony-workspaces
    ports:
      - "${SYMPHONY_PORT:-4000}:4000"
    volumes:
      - ./elixir/WORKFLOW.md:/app/elixir/WORKFLOW.md:ro
      - ./log/docker:/app/elixir/log
      - ${SYMPHONY_HOST_WORKSPACE_ROOT:-./.symphony-workspaces}:/root/code/symphony-workspaces
      - ${HOME}/.codex:/root/.codex:ro
      - ${HOME}/.ssh:/root/.ssh:ro
